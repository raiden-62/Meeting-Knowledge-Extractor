<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Meeting Knowledge Extractor" }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/projects" aria-label="Meeting Knowledge Extractor">
            <span class="brand-mark">MK</span>
            <span>
                <strong>Meeting Knowledge Extractor</strong>
                <small>Решения, задачи, ответственные</small>
            </span>
        </a>
        <nav class="site-nav">
            <a href="/projects">Проекты</a>
            <a href="/docs">REST API</a>
            <a href="/mcp/tool">MCP</a>
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>FastAPI + GigaChat/DeepSeek + агентный анализ встреч</span>
    </footer>
    <script>
        (() => {
            const key = `mke-scroll:${window.location.pathname}`;
            const saved = sessionStorage.getItem(key);
            if (saved !== null) {
                sessionStorage.removeItem(key);
                requestAnimationFrame(() => window.scrollTo(0, Number(saved) || 0));
            }

            const snapshot = (form) => Array.from(form.elements)
                .filter((element) => element.name && !["submit", "button"].includes(element.type))
                .map((element) => `${element.name}=${element.value}`)
                .join("&");

            document.querySelectorAll("form[data-dirty-check]").forEach((form) => {
                const initial = snapshot(form);
                form.dataset.initialSnapshot = initial;
                const submit = form.querySelector("[data-dirty-submit]");
                const update = () => {
                    if (submit) {
                        submit.disabled = snapshot(form) === initial;
                    }
                };
                form.addEventListener("input", update);
                form.addEventListener("change", update);
                update();
            });

            const autosizeTextarea = (textarea) => {
                textarea.style.height = "auto";
                textarea.style.height = `${textarea.scrollHeight}px`;
            };

            document.querySelectorAll("textarea[data-autosize]").forEach((textarea) => {
                autosizeTextarea(textarea);
                textarea.addEventListener("input", () => autosizeTextarea(textarea));
            });

            const toIsoDate = (year, month, day) => {
                const parsed = new Date(Number(year), Number(month) - 1, Number(day));
                if (
                    parsed.getFullYear() !== Number(year) ||
                    parsed.getMonth() !== Number(month) - 1 ||
                    parsed.getDate() !== Number(day)
                ) {
                    return "";
                }
                return [
                    parsed.getFullYear(),
                    String(parsed.getMonth() + 1).padStart(2, "0"),
                    String(parsed.getDate()).padStart(2, "0"),
                ].join("-");
            };

            const localToday = () => {
                const now = new Date();
                return toIsoDate(now.getFullYear(), now.getMonth() + 1, now.getDate());
            };

            const extractMeetingDate = (text) => {
                const head = String(text || "").slice(0, 1000);
                const dotDate = head.match(/\b([0-2]?\d|3[01])\.(0?[1-9]|1[0-2])\.(20\d{2})\b/);
                if (dotDate) {
                    return toIsoDate(dotDate[3], dotDate[2], dotDate[1]);
                }
                const slashDate = head.match(/\b([0-2]?\d|3[01])\/(0?[1-9]|1[0-2])\/(20\d{2})\b/);
                if (slashDate) {
                    return toIsoDate(slashDate[3], slashDate[2], slashDate[1]);
                }
                const isoDate = head.match(/\b(20\d{2})-(0[1-9]|1[0-2])-([0-2]\d|3[01])\b/);
                if (isoDate) {
                    return toIsoDate(isoDate[1], isoDate[2], isoDate[3]);
                }
                return "";
            };

            document.querySelectorAll("form[data-transcript-upload]").forEach((form) => {
                const dateInput = form.querySelector("[data-meeting-date-input]");
                const textInput = form.querySelector("[data-transcript-text-input]");
                const fileInput = form.querySelector("[data-transcript-file-input]");
                if (!dateInput) {
                    return;
                }

                if (!dateInput.value) {
                    dateInput.value = localToday();
                }

                let dateWasEdited = false;
                dateInput.addEventListener("input", () => {
                    dateWasEdited = true;
                });
                dateInput.addEventListener("change", () => {
                    dateWasEdited = true;
                });

                const applyExtractedDate = (text) => {
                    const parsed = extractMeetingDate(text);
                    if (parsed && !dateWasEdited) {
                        dateInput.value = parsed;
                    }
                };

                if (textInput) {
                    textInput.addEventListener("input", () => applyExtractedDate(textInput.value));
                }

                if (fileInput) {
                    fileInput.addEventListener("change", () => {
                        const file = fileInput.files && fileInput.files[0];
                        if (!file) {
                            return;
                        }
                        file.text().then(applyExtractedDate).catch(() => {});
                    });
                }
            });

            document.addEventListener("submit", (event) => {
                const form = event.target;
                if (form instanceof HTMLFormElement && form.method.toLowerCase() === "post") {
                    if (form.matches("[data-dirty-check]") && snapshot(form) === form.dataset.initialSnapshot) {
                        event.preventDefault();
                        return;
                    }
                    sessionStorage.setItem(key, String(window.scrollY));
                }
            });
        })();
    </script>
</body>
</html>
