<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Knowledge Extractor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        textarea {
            width: 100%;
            height: 300px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        pre {
            background: #f4f4f4;
            padding: 20px;
            margin-top: 20px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h1>Meeting Knowledge Extractor</h1>

<textarea id="transcript" placeholder="Вставьте стенограмму сюда..."></textarea>

<br>

<button onclick="analyzeTranscript()">
    Analyze
</button>

<pre id="result"></pre>

<script>
    async function analyzeTranscript() {
        const transcript = document.getElementById("transcript").value;

        const response = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                transcript: transcript
            })
        });

        const data = await response.json();

        document.getElementById("result").textContent =
            JSON.stringify(data, null, 2);
    }
</script>

</body>
</html>
